<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <defs>
    <filter id="oliveNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.68"
        numOctaves="5"
        seed="29"
        stitchTiles="stitch"
      />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.8" intercept="0.1" />
        <feFuncG type="linear" slope="0.8" intercept="0.1" />
        <feFuncB type="linear" slope="0.8" intercept="0.1" />
        <feFuncA type="linear" slope="0.48" />
      </feComponentTransfer>
    </filter>
    <filter id="oliveTone" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.018 0.045"
        numOctaves="3"
        seed="61"
        stitchTiles="stitch"
      />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.68" intercept="0.16" />
        <feFuncG type="linear" slope="0.68" intercept="0.16" />
        <feFuncB type="linear" slope="0.68" intercept="0.16" />
        <feFuncA type="linear" slope="0.18" />
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="320" height="320" fill="#60734a" />
  <rect width="320" height="320" filter="url(#oliveTone)" opacity="0.55" />
  <rect width="320" height="320" filter="url(#oliveNoise)" opacity="0.92" />
</svg>
